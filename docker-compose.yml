# Parlel — 250+ service emulators on local Docker.
#
# RECOMMENDED: use the collision-safe launcher, which publishes only the ports
# for the services you ask for and automatically remaps any port that's already
# busy on your machine (e.g. a local Postgres on 5432):
#
#   SERVICES="postgres,redis,stripe,openai,slack" npm run up
#   SERVICES=all npm run up
#
# This raw compose file publishes ALL service ports unconditionally — handy if
# you want plain `docker compose up`, but it fails if any one of these host
# ports is already in use. Prefer `npm run up` unless you've trimmed this list.
#
#   SERVICES="postgres,redis" docker compose up
#
# Each service listens on its canonical port (below). Point your app at
# localhost:<port> with unmodified real drivers — see .env.example for ports +
# seeded credentials.
services:
  parlel:
    build: .
    image: parlel:local
    environment:
      SERVICES: "${SERVICES:-postgres,redis}"
    ports:
      - "3306:3306"   # mysql
      - "4564:4564"   # cloudformation
      - "4566:4566"   # s3
      - "4567:4567"   # dynamodb
